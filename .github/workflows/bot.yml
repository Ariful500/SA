name: SA SMS WORK Bot

on:
  workflow_dispatch:  # শুধু manually চালাবে

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
          echo "ADMIN_ID=${{ secrets.ADMIN_ID }}" >> .env
          echo "LAMIX_URL=${{ secrets.LAMIX_URL }}" >> .env
          echo "LAMIX_USERNAME=${{ secrets.LAMIX_USERNAME }}" >> .env
          echo "LAMIX_PASSWORD=${{ secrets.LAMIX_PASSWORD }}" >> .env

      - name: Restore users.json (আগের data লোড)
        run: |
          if [ ! -f users.json ]; then
            echo "{}" > users.json
            echo "users.json নতুন তৈরি হয়েছে।"
          else
            echo "users.json আগের data পাওয়া গেছে ✅"
          fi

      - name: Run bot
        run: python bot.py

      - name: Save users.json (bot বন্ধ হলে data সেভ)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add users.json
          git diff --staged --quiet || git commit -m "💾 Auto-save: users data updated"
          git push origin main
